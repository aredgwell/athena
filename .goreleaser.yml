version: 2

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: ./cmd/athena
    binary: athena
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/amr-athena/athena/internal/cli.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

# Homebrew tap: uncomment when amr-athena/homebrew-tap exists and
# HOMEBREW_TAP_TOKEN secret is configured in the repository.
# brews:
#   - repository:
#       owner: amr-athena
#       name: homebrew-tap
#       token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
#     directory: Formula
#     homepage: https://aredgwell.github.io/athena/
#     description: "Structured AI working memory for repositories"
#     license: MIT
#     install: |
#       bin.install "athena"
#     test: |
#       system "#{bin}/athena", "version"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
